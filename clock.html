<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="clock.css">
    <title>digital clock</title>
</head>
<body>
    <div id="clock2" class="clock ">
        <div class="ele " id="hour"><p id="h">0</p></div>
        <div class="ele " id="min"><p id="m">0</p></div>
        <div class="ele xx"id="sec"><p id="s">0</p></div>
    </div>
    <script src="clock.js"></script>
</body>
</html>
